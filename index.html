<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Wheel</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: oklch(14% 0.02 260);
      --surface: oklch(18% 0.025 260);
      --surface2: oklch(22% 0.03 260);
      --border: oklch(32% 0.04 260);
      --text: oklch(94% 0.01 260);
      --muted: oklch(58% 0.04 260);
      --gold: oklch(78% 0.19 60);
      --gold-dark: oklch(52% 0.15 40);
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, oklch(25% 0.06 270 / 0.5), transparent 70%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      color: oklch(92% 0.04 60);
      text-shadow: 0 2px 24px oklch(78% 0.19 60 / 0.3);
    }

    /* ── Wheel ── */
    .scene {
      position: relative;
      width: min(420px, 88vw);
      aspect-ratio: 1;
    }

    .pointer {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 38px solid var(--gold);
      filter: drop-shadow(0 4px 12px oklch(78% 0.19 60 / 0.7));
    }

    .wheel-wrap { width: 100%; height: 100%; }

    canvas#wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }

    .hub {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 68px; height: 68px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #e8e8ec 0%, #b0b0b8 28%, #606068 58%, #28282e 100%);
      box-shadow:
        0 0 0 4px #111,
        0 4px 18px rgba(0,0,0,0.7),
        inset 0 2px 4px rgba(255,255,255,0.55),
        inset 0 -3px 6px rgba(0,0,0,0.45);
      z-index: 10;
    }
    .hub::before {
      content: '';
      position: absolute;
      top: 12%; left: 18%;
      width: 38%; height: 28%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 100%);
      transform: rotate(-20deg);
    }
    .hub::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 0%, #888 60%, #333 100%);
      box-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* ── Buttons row ── */
    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 2.5rem;
      align-items: center;
    }

    .spin-btn {
      padding: 1rem 3.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.18em;
      color: oklch(12% 0.01 260);
      background: linear-gradient(160deg, oklch(82% 0.19 60), oklch(68% 0.22 40));
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 0 var(--gold-dark), 0 6px 24px oklch(68% 0.22 40 / 0.35);
    }
    .spin-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--gold-dark), 0 10px 32px oklch(68% 0.22 40 / 0.45); }
    .spin-btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 var(--gold-dark), 0 4px 12px oklch(68% 0.22 40 / 0.3); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .manage-btn {
      width: 48px; height: 48px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .manage-btn:hover { color: var(--text); border-color: oklch(50% 0.05 260); background: oklch(26% 0.035 260); }
    .manage-btn svg { width: 20px; height: 20px; }

    /* ── Admin panel ── */
    .panel-backdrop {
      position: fixed;
      inset: 0;
      background: oklch(8% 0.02 260 / 0.6);
      backdrop-filter: blur(4px);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .panel-backdrop.open { opacity: 1; pointer-events: all; }

    .panel {
      position: fixed;
      top: 0; right: 0;
      height: 100%;
      width: min(380px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 51;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .panel.open { transform: translateX(0); }

    .panel-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      color: oklch(92% 0.04 60);
    }
    .panel-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      transition: color 0.15s;
    }
    .panel-close:hover { color: var(--text); }
    .panel-close svg { width: 20px; height: 20px; }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .player-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .player-item:hover { border-color: var(--border); }

    .player-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .player-name {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-remove {
      background: none;
      border: none;
      color: oklch(45% 0.05 260);
      cursor: pointer;
      padding: 2px;
      display: flex;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .player-remove:hover { color: oklch(70% 0.18 25); background: oklch(28% 0.04 25); }
    .player-remove svg { width: 16px; height: 16px; }

    .booster-btn {
      background: none;
      border: 1px solid oklch(38% 0.05 260);
      color: oklch(48% 0.05 260);
      cursor: pointer;
      padding: 1px 6px;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
      line-height: 1.6;
    }
    .booster-btn:hover { color: var(--gold); border-color: oklch(55% 0.12 60); }
    .booster-btn.active {
      color: oklch(12% 0.01 260);
      background: linear-gradient(135deg, oklch(82% 0.19 60), oklch(68% 0.22 40));
      border-color: oklch(68% 0.22 40);
    }

    .panel-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .add-form {
      display: flex;
      gap: 0.5rem;
    }
    .add-input {
      flex: 1;
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input::placeholder { color: var(--muted); }
    .add-input:focus { border-color: oklch(55% 0.08 270); }
    .add-btn {
      padding: 0.6rem 1rem;
      background: oklch(55% 0.14 270);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { background: oklch(62% 0.16 270); }

    .empty-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem 0;
    }

    /* ── Winner overlay ── */
    .winner-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: oklch(8% 0.02 260 / 0.88);
      backdrop-filter: blur(6px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .winner-overlay.show { opacity: 1; pointer-events: all; }
    .winner-card {
      text-align: center;
      padding: 3rem 4rem;
      background: var(--surface);
      border: 1px solid oklch(35% 0.05 260);
      border-radius: 8px;
      box-shadow: 0 24px 80px oklch(0% 0 0 / 0.6);
      transform: scale(0.88);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .winner-overlay.show .winner-card { transform: scale(1); }
    .winner-label {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .winner-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 2rem;
    }
    .winner-ig {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .winner-ig:hover { color: var(--text); }
    .winner-close {
      padding: 0.7rem 2.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .winner-close:hover { background: oklch(25% 0.03 260); border-color: oklch(60% 0.05 260); }

    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 99; }

    /* ── Zoom modal ── */
    .zoom-backdrop {
      position: fixed;
      inset: 0;
      background: oklch(8% 0.02 260 / 0.82);
      backdrop-filter: blur(8px);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .zoom-backdrop.open { opacity: 1; pointer-events: all; }
    .zoom-modal {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      transform: scale(0.92);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .zoom-backdrop.open .zoom-modal { transform: scale(1); }
    #zoomCanvas {
      border-radius: 50%;
      display: block;
      box-shadow: 0 0 80px oklch(0% 0 0 / 0.7);
    }
    .zoom-close {
      padding: 0.55rem 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .zoom-close:hover { color: var(--text); border-color: oklch(50% 0.05 260); }
  </style>
</head>
<body>

  <h1>Fortune Wheel</h1>
  <div id="mainPlayerCount" style="font-size:0.85rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:-1.75rem;margin-bottom:2rem"></div>

  <div class="scene">
    <div class="pointer"></div>
    <div class="wheel-wrap">
      <canvas id="wheel" width="840" height="840"></canvas>
      <div class="hub"></div>
    </div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spinBtn">SPIN</button>
    <button class="manage-btn" id="zoomBtn" title="Zoom wheel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <button class="manage-btn" id="manageBtn" title="Manage players">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/>
      </svg>
    </button>
  </div>

  <!-- Admin panel -->
  <div class="panel-backdrop" id="backdrop"></div>
  <div class="panel" id="panel">
    <div class="panel-header">
      <span class="panel-title">Players <span id="playerCount" style="font-size:0.85rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0.04em"></span></span>
      <button class="panel-close" id="panelClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="panel-body" id="playerList"></div>
    <div class="panel-footer">
      <div class="add-form">
        <input class="add-input" id="addInput" type="text" placeholder="Add player(s), comma-separated…" maxlength="10000" />
        <button class="add-btn" id="addBtn">Add</button>
      </div>
    </div>
  </div>

  <!-- Zoom modal -->
  <div class="zoom-backdrop" id="zoomBackdrop">
    <div class="zoom-modal">
      <canvas id="zoomCanvas"></canvas>
      <button class="zoom-close" id="zoomClose">Close</button>
    </div>
  </div>

  <canvas id="confetti"></canvas>

  <div class="winner-overlay" id="winnerOverlay">
    <div class="winner-card">
      <div class="winner-label">Winner</div>
      <div class="winner-name" id="winnerName"></div>
      <a class="winner-ig" id="winnerIg" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        @<span id="winnerIgHandle"></span>
      </a>
      <button class="winner-close" id="closeBtn">Spin again</button>
    </div>
  </div>

  <script>
    // ── Color palette (cycles if more players than colors) ──
    const PALETTE = [
      { fill: '#e8442a', dark: '#a02f1c', light: '#f07060' },
      { fill: '#2db870', dark: '#1a7a47', light: '#5ad696' },
      { fill: '#7c4dcc', dark: '#4e2e88', light: '#a87de8' },
      { fill: '#d4a020', dark: '#8e6a12', light: '#f0c84a' },
      { fill: '#1aa8cc', dark: '#0e6a82', light: '#52ccee' },
      { fill: '#e0407a', dark: '#962a52', light: '#f07aa8' },
      { fill: '#e86a1a', dark: '#9a4610', light: '#f09a5a' },
      { fill: '#3ab87a', dark: '#22784e', light: '#6ad4a0' },
      { fill: '#9b3dc8', dark: '#652688', light: '#c070e8' },
      { fill: '#2a8fd4', dark: '#1a5c8a', light: '#60b8f0' },
      { fill: '#c0392b', dark: '#7b2518', light: '#e07060' },
      { fill: '#16a085', dark: '#0d6b59', light: '#48c9b0' },
      { fill: '#8e44ad', dark: '#5e2d73', light: '#bb8fce' },
      { fill: '#f39c12', dark: '#a26209', light: '#f8c471' },
      { fill: '#2471a3', dark: '#174b6c', light: '#5dade2' },
      { fill: '#cb4335', dark: '#882b22', light: '#e59488' },
      { fill: '#1e8449', dark: '#145c32', light: '#52be80' },
      { fill: '#6c3483', dark: '#47235a', light: '#a569bd' },
      { fill: '#b7770d', dark: '#7a5009', light: '#d4ac0d' },
      { fill: '#1a5276', dark: '#10364e', light: '#2e86c1' },
      { fill: '#d35400', dark: '#8c3800', light: '#e59866' },
      { fill: '#117a65', dark: '#0a5144', light: '#45b39d' },
      { fill: '#512e5f', dark: '#351e3f', light: '#7d3c98' },
      { fill: '#9a7d0a', dark: '#665306', light: '#d4ac0d' },
      { fill: '#154360', dark: '#0d2d40', light: '#1a5276' },
      { fill: '#a04000', dark: '#6b2a00', light: '#d35400' },
      { fill: '#0e6655', dark: '#094438', light: '#148f77' },
      { fill: '#4a235a', dark: '#30173b', light: '#76448a' },
      { fill: '#7e5109', dark: '#533607', light: '#b7770d' },
      { fill: '#1b4f72', dark: '#11344c', light: '#2471a3' },
    ];

    const DEFAULT_PLAYERS = [
      'langtu.daknong','flywithpunit','omi.maq','adryx_jatin',
      'krisnguyen995','dirk789','nhannt0605','hanru.nguyen','4.k.93','hannhi_99'
    ];

    // ── State (persisted) ──
    function loadPlayers() {
      try {
        const saved = localStorage.getItem('fw-players');
        if (saved) return JSON.parse(saved);
      } catch {}
      return [...DEFAULT_PLAYERS];
    }
    function savePlayers(list) {
      localStorage.setItem('fw-players', JSON.stringify(list));
    }
    function loadBoosted() {
      try {
        const saved = localStorage.getItem('fw-boosted');
        if (saved) return new Set(JSON.parse(saved));
      } catch {}
      return new Set();
    }
    function saveBoosted() {
      localStorage.setItem('fw-boosted', JSON.stringify([...boosted]));
    }

    let players = loadPlayers().sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    let boosted = loadBoosted();

    function wheelEntries() {
      const entries = [];
      for (let i = 0; i < players.length; i++) {
        entries.push({ name: players[i], colorIdx: i });
        if (boosted.has(players[i])) entries.push({ name: players[i], colorIdx: i });
      }
      return entries;
    }

    // ── Canvas setup ──
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const CX = W / 2, CY = W / 2, R = W / 2 - 8;

    let angle = 0;
    let spinning = false;

    function colorFor(i) { return PALETTE[i % PALETTE.length]; }

    // Blend two hex colors by t (0=A, 1=B)
    function hexBlend(hexA, hexB, t) {
      const parse = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
      const [r1,g1,b1] = parse(hexA), [r2,g2,b2] = parse(hexB);
      return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
    }

    function drawWheel(rot, tCtx, tW) {
      tCtx = tCtx || ctx;
      tW   = tW   || W;
      const tCX = tW / 2, tCY = tW / 2, tR = tW / 2 - 8;

      tCtx.clearRect(0, 0, tW, tW);
      const entries = wheelEntries();
      const n = entries.length;

      const RIM = Math.round(tR * (34 / (W / 2 - 8)));
      const IR  = tR - RIM;

      if (n === 0) {
        tCtx.fillStyle = 'rgba(255,255,255,0.06)';
        tCtx.beginPath(); tCtx.arc(tCX, tCY, IR, 0, Math.PI * 2); tCtx.fill();
        tCtx.fillStyle = 'rgba(255,255,255,0.5)';
        tCtx.font = `600 28px 'DM Sans', sans-serif`;
        tCtx.textAlign = 'center'; tCtx.textBaseline = 'middle';
        tCtx.fillText('No players', tCX, tCY);
      }

      const slice = n > 0 ? (2 * Math.PI) / n : 0;

      // ── 1. Segment fills ──
      for (let i = 0; i < n; i++) {
        const start = rot + i * slice, end = start + slice;
        const col = colorFor(entries[i].colorIdx);
        const grd = tCtx.createRadialGradient(tCX - IR * 0.14, tCY - IR * 0.20, 0, tCX, tCY, IR);
        grd.addColorStop(0,    hexBlend(col.fill, '#ffffff', 0.55));
        grd.addColorStop(0.26, hexBlend(col.fill, '#ffffff', 0.14));
        grd.addColorStop(0.62, col.fill);
        grd.addColorStop(1,    col.dark);
        tCtx.beginPath();
        tCtx.moveTo(tCX, tCY);
        tCtx.arc(tCX, tCY, IR, start, end);
        tCtx.closePath();
        tCtx.fillStyle = grd;
        tCtx.fill();
      }

      // ── 2. Directional light wash ──
      tCtx.save();
      tCtx.beginPath(); tCtx.arc(tCX, tCY, IR, 0, Math.PI * 2); tCtx.clip();
      const dir = tCtx.createLinearGradient(tCX - IR * 0.85, tCY - IR * 0.85, tCX + IR * 0.65, tCY + IR * 0.65);
      dir.addColorStop(0,    'rgba(255,255,255,0.18)');
      dir.addColorStop(0.42, 'rgba(255,255,255,0)');
      dir.addColorStop(1,    'rgba(0,0,0,0.20)');
      tCtx.fillStyle = dir; tCtx.fillRect(0, 0, tW, tW);
      tCtx.restore();

      // ── 3. Embossed dividers ──
      for (let i = 0; i < n; i++) {
        const a = rot + i * slice;
        const cos = Math.cos(a), sin = Math.sin(a);
        tCtx.beginPath();
        tCtx.moveTo(tCX + cos * 10, tCY + sin * 10);
        tCtx.lineTo(tCX + cos * IR, tCY + sin * IR);
        tCtx.strokeStyle = 'rgba(0,0,0,0.55)'; tCtx.lineWidth = 3; tCtx.stroke();
        tCtx.beginPath();
        tCtx.moveTo(tCX + cos * 10, tCY + sin * 10);
        tCtx.lineTo(tCX + cos * IR, tCY + sin * IR);
        tCtx.strokeStyle = 'rgba(255,255,255,0.20)'; tCtx.lineWidth = 1; tCtx.stroke();
      }

      // ── 4. Inner-edge vignette ──
      const vig = tCtx.createRadialGradient(tCX, tCY, IR - 20, tCX, tCY, IR + 2);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,0,0.50)');
      tCtx.beginPath(); tCtx.arc(tCX, tCY, IR + 2, 0, Math.PI * 2);
      tCtx.fillStyle = vig; tCtx.fill();

      // ── 5. Text ──
      for (let i = 0; i < n; i++) {
        const mid = rot + i * slice + slice / 2;
        tCtx.save();
        tCtx.translate(tCX, tCY); tCtx.rotate(mid);
        tCtx.textAlign = 'right'; tCtx.textBaseline = 'middle';
        tCtx.shadowColor = 'rgba(0,0,0,0.75)';
        tCtx.shadowBlur = 6; tCtx.shadowOffsetX = 1; tCtx.shadowOffsetY = 2;
        const maxTextWidth = IR * 0.79;
        const maxFontHeight = n > 1 ? 2 * (IR * 0.89 - maxTextWidth) * Math.sin(slice / 2) * 0.82 : IR;
        let fontSize = Math.min(IR * 0.165, Math.max(10, IR * 0.165));
        tCtx.font = `700 ${fontSize}px 'DM Sans', sans-serif`;
        const entryName = entries[i].name;
        const measuredWidth = tCtx.measureText(entryName).width;
        if (measuredWidth > maxTextWidth || fontSize > maxFontHeight) {
          fontSize = Math.max(10, fontSize * Math.min(maxTextWidth / measuredWidth, maxFontHeight / fontSize));
          tCtx.font = `700 ${fontSize}px 'DM Sans', sans-serif`;
        }
        tCtx.fillStyle = 'rgba(255,255,255,0.96)';
        tCtx.fillText(entryName, IR * 0.89, 0);
        tCtx.restore();
      }

      // ── 6. Metallic rim ──
      const rimGrd = tCtx.createRadialGradient(tCX, tCY, IR, tCX, tCY, tR);
      rimGrd.addColorStop(0,    '#1a1a1e');
      rimGrd.addColorStop(0.22, '#505058');
      rimGrd.addColorStop(0.50, '#9a9aa8');
      rimGrd.addColorStop(0.78, '#505058');
      rimGrd.addColorStop(1,    '#18181c');
      tCtx.beginPath();
      tCtx.arc(tCX, tCY, tR,  0, Math.PI * 2);
      tCtx.arc(tCX, tCY, IR, 0, Math.PI * 2, true);
      tCtx.fillStyle = rimGrd; tCtx.fill('evenodd');

      const bev = tCtx.createLinearGradient(tCX - tR, tCY - tR, tCX + tR, tCY + tR);
      bev.addColorStop(0,    'rgba(255,255,255,0.62)');
      bev.addColorStop(0.22, 'rgba(255,255,255,0.22)');
      bev.addColorStop(0.44, 'rgba(255,255,255,0.04)');
      bev.addColorStop(0.66, 'rgba(0,0,0,0.10)');
      bev.addColorStop(1,    'rgba(0,0,0,0.55)');
      tCtx.beginPath(); tCtx.arc(tCX, tCY, IR + RIM / 2, 0, Math.PI * 2);
      tCtx.strokeStyle = bev; tCtx.lineWidth = RIM; tCtx.stroke();

      tCtx.beginPath(); tCtx.arc(tCX, tCY, tR - 2, 0, Math.PI * 2);
      tCtx.strokeStyle = 'rgba(0,0,0,0.80)'; tCtx.lineWidth = 4; tCtx.stroke();

      tCtx.beginPath(); tCtx.arc(tCX, tCY, IR, 0, Math.PI * 2);
      tCtx.strokeStyle = 'rgba(0,0,0,0.65)'; tCtx.lineWidth = 3; tCtx.stroke();

      for (let deg = 0; deg < 360; deg += 10) {
        const a = (deg * Math.PI) / 180;
        const isTick = deg % 30 === 0;
        const tickLen = isTick ? 7 : 4;
        const mid2 = IR + RIM / 2;
        tCtx.beginPath();
        tCtx.moveTo(tCX + Math.cos(a) * (mid2 - tickLen), tCY + Math.sin(a) * (mid2 - tickLen));
        tCtx.lineTo(tCX + Math.cos(a) * (mid2 + tickLen), tCY + Math.sin(a) * (mid2 + tickLen));
        tCtx.strokeStyle = isTick ? 'rgba(255,255,255,0.30)' : 'rgba(255,255,255,0.12)';
        tCtx.lineWidth = isTick ? 1.5 : 1;
        tCtx.stroke();
      }

      // ── 7. Glossy dome reflection ──
      tCtx.save();
      tCtx.beginPath(); tCtx.arc(tCX, tCY, tR - 2, 0, Math.PI * 2); tCtx.clip();
      const gloss = tCtx.createRadialGradient(tCX, tCY - tR * 0.25, 0, tCX, tCY + tR * 0.08, tR * 0.92);
      gloss.addColorStop(0,    'rgba(255,255,255,0.32)');
      gloss.addColorStop(0.28, 'rgba(255,255,255,0.12)');
      gloss.addColorStop(0.52, 'rgba(255,255,255,0.02)');
      gloss.addColorStop(1,    'rgba(255,255,255,0)');
      tCtx.fillStyle = gloss;
      tCtx.fillRect(0, 0, tW, tCY + tR * 0.38);
      tCtx.restore();
    }

    drawWheel(angle);
    {
      const entryCount = wheelEntries().length;
      const boostedCount = boosted.size;
      document.getElementById('mainPlayerCount').textContent = boostedCount > 0
        ? `${players.length} player${players.length !== 1 ? 's' : ''} · ${entryCount} slots`
        : `${players.length} player${players.length !== 1 ? 's' : ''}`;
    }

    // ── Spin ──
    const spinBtn = document.getElementById('spinBtn');

    spinBtn.addEventListener('click', () => {
      if (spinning || wheelEntries().length < 2) return;
      spinning = true;
      spinBtn.disabled = true;

      const extraTurns = 6 + Math.floor(Math.random() * 5);
      const randomStop = Math.random() * Math.PI * 2;
      const totalRotation = extraTurns * Math.PI * 2 + randomStop;
      const duration = 4200 + Math.random() * 800;
      const startAngle = angle;
      const startTime = performance.now();

      function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        angle = startAngle + totalRotation * easeOutQuint(t);
        drawWheel(angle);
        if (t < 1) { requestAnimationFrame(frame); }
        else { spinning = false; showWinner(); }
      }
      requestAnimationFrame(frame);
    });

    function getWinner() {
      const entries = wheelEntries();
      const n = entries.length;
      const slice = (2 * Math.PI) / n;
      const normalized = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const pointerAngle = (Math.PI * 2 - Math.PI / 2 + Math.PI * 2) % (Math.PI * 2);
      const shifted = (pointerAngle - normalized + Math.PI * 2) % (Math.PI * 2);
      const idx = Math.floor(shifted / slice) % n;
      return { name: entries[idx].name, color: colorFor(entries[idx].colorIdx) };
    }

    function showWinner() {
      const w = getWinner();
      document.getElementById('winnerName').textContent = w.name;
      document.getElementById('winnerName').style.color = w.color.light;
      const ig = document.getElementById('winnerIg');
      document.getElementById('winnerIgHandle').textContent = w.name;
      ig.href = `https://instagram.com/${encodeURIComponent(w.name)}`;
      document.getElementById('winnerOverlay').classList.add('show');
      launchConfetti();
    }

    document.getElementById('closeBtn').addEventListener('click', () => {
      document.getElementById('winnerOverlay').classList.remove('show');
      stopConfetti();
      spinBtn.disabled = false;
    });

    // ── Admin panel ──
    const panel = document.getElementById('panel');
    const backdrop = document.getElementById('backdrop');

    function openPanel() {
      panel.classList.add('open');
      backdrop.classList.add('open');
      renderPlayerList();
    }
    function closePanel() {
      panel.classList.remove('open');
      backdrop.classList.remove('open');
    }

    document.getElementById('manageBtn').addEventListener('click', openPanel);
    document.getElementById('panelClose').addEventListener('click', closePanel);
    backdrop.addEventListener('click', closePanel);

    function renderPlayerList() {
      const list = document.getElementById('playerList');
      const entryCount = wheelEntries().length;
      const boostedCount = boosted.size;
      const countSuffix = boostedCount > 0 ? ` · ${entryCount} slots` : '';
      document.getElementById('playerCount').textContent = `(${players.length}${countSuffix})`;
      const mainLabel = boostedCount > 0
        ? `${players.length} player${players.length !== 1 ? 's' : ''} · ${entryCount} slots`
        : `${players.length} player${players.length !== 1 ? 's' : ''}`;
      document.getElementById('mainPlayerCount').textContent = mainLabel;
      list.innerHTML = '';

      if (players.length === 0) {
        list.innerHTML = '<p class="empty-note">No players yet. Add one below.</p>';
        return;
      }

      players.forEach((name, i) => {
        const col = colorFor(i);
        const isBoosted = boosted.has(name);
        const item = document.createElement('div');
        item.className = 'player-item';
        item.innerHTML = `
          <span class="player-dot" style="background:${col.fill}"></span>
          <span class="player-name">${escHtml(name)}</span>
          <button class="booster-btn${isBoosted ? ' active' : ''}" data-name="${escHtml(name)}" title="2× booster — appears twice on the wheel">2×</button>
          <button class="player-remove" data-idx="${i}" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>`;
        list.appendChild(item);
      });

      list.querySelectorAll('.booster-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.name;
          if (boosted.has(name)) boosted.delete(name);
          else boosted.add(name);
          saveBoosted();
          drawWheel(angle);
          renderPlayerList();
        });
      });

      list.querySelectorAll('.player-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          boosted.delete(players[idx]);
          players.splice(idx, 1);
          savePlayers(players);
          saveBoosted();
          drawWheel(angle);
          renderPlayerList();
        });
      });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const addInput = document.getElementById('addInput');
    const addBtn = document.getElementById('addBtn');

    function addPlayer() {
      const raw = addInput.value.trim();
      if (!raw) { addInput.focus(); return; }
      const seen = new Set(players.map(p => p.toLowerCase()));
      const names = [];
      for (const s of raw.split(',').map(s => s.trim())) {
        if (s && !seen.has(s.toLowerCase())) { names.push(s); seen.add(s.toLowerCase()); }
      }
      if (!names.length) { addInput.focus(); return; }
      players.push(...names);
      players.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
      savePlayers(players);
      addInput.value = '';
      addInput.focus();
      drawWheel(angle);
      renderPlayerList();
    }

    addBtn.addEventListener('click', addPlayer);
    addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

    // ── Zoom modal ──
    const zoomBackdrop = document.getElementById('zoomBackdrop');
    const zoomCanvas   = document.getElementById('zoomCanvas');

    function openZoom() {
      const size = Math.round(Math.min(window.innerWidth * 0.88, window.innerHeight * 0.88, 1200));
      zoomCanvas.width  = size;
      zoomCanvas.height = size;
      drawWheel(angle, zoomCanvas.getContext('2d'), size);
      zoomBackdrop.classList.add('open');
    }

    document.getElementById('zoomBtn').addEventListener('click', openZoom);
    document.getElementById('zoomClose').addEventListener('click', () => zoomBackdrop.classList.remove('open'));
    zoomBackdrop.addEventListener('click', e => { if (e.target === zoomBackdrop) zoomBackdrop.classList.remove('open'); });

    // ── Confetti ──
    const cCanvas = document.getElementById('confetti');
    const cCtx = cCanvas.getContext('2d');
    let confettiParticles = [], confettiFrame = null;

    function resizeConfetti() { cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight; }
    resizeConfetti();
    window.addEventListener('resize', resizeConfetti);

    function launchConfetti() {
      resizeConfetti();
      const palette = PALETTE.map(c => c.fill).concat(['#fff','#f0c84a']);
      confettiParticles = Array.from({ length: 140 }, () => ({
        x: Math.random() * cCanvas.width, y: -10 - Math.random() * 200,
        r: 4 + Math.random() * 7,
        color: palette[Math.floor(Math.random() * palette.length)],
        vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 0.2,
        shape: Math.random() > 0.5 ? 'rect' : 'circle',
      }));

      function animate() {
        cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
        confettiParticles.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.rot += p.vrot; p.vy += 0.06;
          cCtx.save();
          cCtx.translate(p.x, p.y); cCtx.rotate(p.rot);
          cCtx.fillStyle = p.color;
          cCtx.globalAlpha = Math.max(0, 1 - p.y / (cCanvas.height * 1.1));
          if (p.shape === 'rect') { cCtx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r); }
          else { cCtx.beginPath(); cCtx.arc(0, 0, p.r * 0.7, 0, Math.PI * 2); cCtx.fill(); }
          cCtx.restore();
        });
        confettiParticles = confettiParticles.filter(p => p.y < cCanvas.height + 30);
        if (confettiParticles.length > 0) confettiFrame = requestAnimationFrame(animate);
        else cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
      }
      if (confettiFrame) cancelAnimationFrame(confettiFrame);
      confettiFrame = requestAnimationFrame(animate);
    }

    function stopConfetti() {
      if (confettiFrame) cancelAnimationFrame(confettiFrame);
      cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
      confettiParticles = [];
    }
  </script>
</body>
</html>
