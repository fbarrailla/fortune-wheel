<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Wheel</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: oklch(62% 0.22 25);    /* red-orange */
      --c2: oklch(72% 0.18 145);   /* emerald */
      --c3: oklch(65% 0.20 270);   /* violet */
      --c4: oklch(78% 0.19 60);    /* gold */
      --bg: oklch(14% 0.02 260);
      --surface: oklch(18% 0.025 260);
      --text: oklch(94% 0.01 260);
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* Subtle radial background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, oklch(25% 0.06 270 / 0.5), transparent 70%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      color: oklch(92% 0.04 60);
      text-shadow: 0 2px 24px oklch(78% 0.19 60 / 0.3);
    }

    /* ── Wheel scene ── */
    .scene {
      position: relative;
      width: min(420px, 88vw);
      aspect-ratio: 1;
      perspective: 900px;
    }

    /* Pointer arrow */
    .pointer {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 38px solid oklch(94% 0.18 60);
      filter: drop-shadow(0 4px 12px oklch(78% 0.19 60 / 0.7));
    }

    .wheel-wrap {
      width: 100%;
      height: 100%;
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }

    /* Hub cap */
    .hub {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        oklch(88% 0.02 60),
        oklch(55% 0.02 260) 60%,
        oklch(28% 0.02 260)
      );
      box-shadow:
        0 2px 10px oklch(0% 0 0 / 0.5),
        inset 0 1px 3px oklch(100% 0 0 / 0.4),
        inset 0 -2px 4px oklch(0% 0 0 / 0.3);
      z-index: 10;
    }
    .hub::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: oklch(90% 0.04 60);
      box-shadow: 0 0 8px oklch(78% 0.19 60 / 0.8);
    }

    /* ── Button ── */
    .spin-btn {
      margin-top: 3rem;
      padding: 1rem 3.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.18em;
      color: oklch(12% 0.01 260);
      background: linear-gradient(160deg,
        oklch(82% 0.19 60),
        oklch(68% 0.22 40)
      );
      border: none;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow:
        0 4px 0 oklch(48% 0.14 40),
        0 6px 24px oklch(68% 0.22 40 / 0.35);
    }
    .spin-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 6px 0 oklch(48% 0.14 40),
        0 10px 32px oklch(68% 0.22 40 / 0.45);
    }
    .spin-btn:active {
      transform: translateY(2px);
      box-shadow:
        0 2px 0 oklch(48% 0.14 40),
        0 4px 12px oklch(68% 0.22 40 / 0.3);
    }
    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Winner overlay ── */
    .winner-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: oklch(8% 0.02 260 / 0.88);
      backdrop-filter: blur(6px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .winner-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .winner-card {
      text-align: center;
      padding: 3rem 4rem;
      background: var(--surface);
      border: 1px solid oklch(35% 0.05 260);
      border-radius: 8px;
      box-shadow: 0 24px 80px oklch(0% 0 0 / 0.6);
      transform: scale(0.88);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .winner-overlay.show .winner-card {
      transform: scale(1);
    }
    .winner-label {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: oklch(60% 0.04 260);
      margin-bottom: 0.75rem;
    }
    .winner-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 2rem;
    }
    .winner-close {
      padding: 0.7rem 2.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      background: transparent;
      border: 1.5px solid oklch(45% 0.05 260);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .winner-close:hover {
      background: oklch(25% 0.03 260);
      border-color: oklch(60% 0.05 260);
    }

    /* Confetti canvas */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
    }
  </style>
</head>
<body>

  <h1>Fortune Wheel</h1>

  <div class="scene">
    <div class="pointer"></div>
    <div class="wheel-wrap">
      <canvas id="wheel" width="840" height="840"></canvas>
      <div class="hub"></div>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn">SPIN</button>

  <canvas id="confetti"></canvas>

  <div class="winner-overlay" id="winnerOverlay">
    <div class="winner-card">
      <div class="winner-label">Winner</div>
      <div class="winner-name" id="winnerName"></div>
      <button class="winner-close" id="closeBtn">Spin again</button>
    </div>
  </div>

  <script>
    const NAMES = ['langtu.daknong', 'flywithpunit', 'omi.maq', 'adryx_jatin'];

    // Colors in hex for canvas (OKLCH approximations)
    const COLORS = [
      { fill: '#e8442a', dark: '#a02f1c', light: '#f07060' },  // red-orange
      { fill: '#2db870', dark: '#1a7a47', light: '#5ad696' },  // emerald
      { fill: '#7c4dcc', dark: '#4e2e88', light: '#a87de8' },  // violet
      { fill: '#d4a020', dark: '#8e6a12', light: '#f0c84a' },  // gold
    ];

    const N = NAMES.length;
    const SLICE = (2 * Math.PI) / N;
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const CX = W / 2, CY = W / 2, R = W / 2 - 8;

    let angle = 0;        // current rotation
    let spinning = false;

    function drawWheel(rot) {
      ctx.clearRect(0, 0, W, W);

      for (let i = 0; i < N; i++) {
        const start = rot + i * SLICE;
        const end = start + SLICE;
        const mid = start + SLICE / 2;
        const col = COLORS[i];

        // Main segment fill with radial gradient for 3D shine
        const grd = ctx.createRadialGradient(CX, CY, R * 0.08, CX, CY, R);
        grd.addColorStop(0, col.light);
        grd.addColorStop(0.45, col.fill);
        grd.addColorStop(1, col.dark);

        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.arc(CX, CY, R, start, end);
        ctx.closePath();
        ctx.fillStyle = grd;
        ctx.fill();

        // Segment border
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Highlight rim arc
        ctx.save();
        ctx.beginPath();
        ctx.arc(CX, CY, R - 4, start + 0.04, end - 0.04);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 6;
        ctx.stroke();
        ctx.restore();

        // Text
        ctx.save();
        ctx.translate(CX, CY);
        ctx.rotate(mid);
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';

        const textR = R * 0.84;
        // shadow
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 2;

        const fontSize = Math.min(36, Math.max(22, (R * 0.18)));
        ctx.font = `700 ${fontSize}px 'DM Sans', sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.fillText(NAMES[i], textR, 0);
        ctx.restore();
      }

      // Outer ring bevel
      const ring = ctx.createLinearGradient(CX - R, CY - R, CX + R, CY + R);
      ring.addColorStop(0, 'rgba(255,255,255,0.22)');
      ring.addColorStop(0.5, 'rgba(255,255,255,0.04)');
      ring.addColorStop(1, 'rgba(0,0,0,0.25)');
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.strokeStyle = ring;
      ctx.lineWidth = 10;
      ctx.stroke();
    }

    drawWheel(angle);

    // ── Spin logic ──
    const spinBtn = document.getElementById('spinBtn');

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;

      // Random target: many full turns + random stop
      const extraTurns = 6 + Math.floor(Math.random() * 5);
      const randomStop = Math.random() * Math.PI * 2;
      const totalRotation = extraTurns * Math.PI * 2 + randomStop;

      const duration = 4200 + Math.random() * 800;
      const startAngle = angle;
      const startTime = performance.now();

      function easeOutQuint(t) {
        return 1 - Math.pow(1 - t, 5);
      }

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const eased = easeOutQuint(t);
        angle = startAngle + totalRotation * eased;
        drawWheel(angle);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          angle = startAngle + totalRotation;
          drawWheel(angle);
          spinning = false;
          showWinner();
        }
      }

      requestAnimationFrame(frame);
    });

    function getWinner() {
      // Pointer is at top (angle = -PI/2 from canvas right = 0).
      // Normalize angle so 0 = right, positive = clockwise.
      // Pointer at top means we check which segment covers -PI/2 (270°).
      const normalized = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const pointerAngle = (Math.PI * 2 - Math.PI / 2 + Math.PI * 2) % (Math.PI * 2);
      // Which segment is under pointer?
      const shifted = (pointerAngle - normalized % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      const idx = Math.floor(shifted / SLICE) % N;
      return { name: NAMES[idx], color: COLORS[idx] };
    }

    function showWinner() {
      const winner = getWinner();
      const nameEl = document.getElementById('winnerName');
      nameEl.textContent = winner.name;
      nameEl.style.color = winner.color.light;
      document.getElementById('winnerOverlay').classList.add('show');
      launchConfetti(winner.color.fill);
    }

    document.getElementById('closeBtn').addEventListener('click', () => {
      document.getElementById('winnerOverlay').classList.remove('show');
      stopConfetti();
      spinBtn.disabled = false;
    });

    // ── Confetti ──
    const cCanvas = document.getElementById('confetti');
    const cCtx = cCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiFrame = null;

    function resizeConfetti() {
      cCanvas.width = window.innerWidth;
      cCanvas.height = window.innerHeight;
    }
    resizeConfetti();
    window.addEventListener('resize', resizeConfetti);

    function launchConfetti(baseColor) {
      resizeConfetti();
      const palette = ['#e8442a','#2db870','#7c4dcc','#d4a020','#fff','#f0c84a'];
      confettiParticles = Array.from({ length: 140 }, () => ({
        x: Math.random() * cCanvas.width,
        y: -10 - Math.random() * 200,
        r: 4 + Math.random() * 7,
        color: palette[Math.floor(Math.random() * palette.length)],
        vx: (Math.random() - 0.5) * 4,
        vy: 2 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.2,
        shape: Math.random() > 0.5 ? 'rect' : 'circle',
      }));

      function animateConfetti() {
        cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
        confettiParticles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vrot;
          p.vy += 0.06; // gravity
          cCtx.save();
          cCtx.translate(p.x, p.y);
          cCtx.rotate(p.rot);
          cCtx.fillStyle = p.color;
          cCtx.globalAlpha = Math.max(0, 1 - p.y / (cCanvas.height * 1.1));
          if (p.shape === 'rect') {
            cCtx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
          } else {
            cCtx.beginPath();
            cCtx.arc(0, 0, p.r * 0.7, 0, Math.PI * 2);
            cCtx.fill();
          }
          cCtx.restore();
        });
        confettiParticles = confettiParticles.filter(p => p.y < cCanvas.height + 30);
        if (confettiParticles.length > 0) {
          confettiFrame = requestAnimationFrame(animateConfetti);
        } else {
          cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
        }
      }
      if (confettiFrame) cancelAnimationFrame(confettiFrame);
      confettiFrame = requestAnimationFrame(animateConfetti);
    }

    function stopConfetti() {
      if (confettiFrame) cancelAnimationFrame(confettiFrame);
      cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
      confettiParticles = [];
    }
  </script>
</body>
</html>
